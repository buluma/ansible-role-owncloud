---
- become: true
  gather_facts: false
- name: Prepare
  hosts: all
  name: Prepare
  pre_tasks:
    - name: Install python3 and sudo
      ansible.builtin.raw: |
        if command -v dnf 2>/dev/null; then
          dnf install -y python3 sudo
        elif command -v apt-get 2>/dev/null; then
          apt-get update -qq && apt-get install -y python3 sudo
        elif command -v apk 2>/dev/null; then
          apk update && apk add python3 sudo
        fi
      become: false
      changed_when: true

    - name: Find EXTERNALLY-MANAGED files
      ansible.builtin.find:
        paths: /usr/lib
        patterns: "EXTERNALLY-MANAGED"
        recurse: true
      register: externally_managed_files

    - name: Remove EXTERNALLY-MANAGED files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ externally_managed_files.files }}"

  roles:
    - role: buluma.bootstrap
    - role: buluma.core_dependencies
    - role: buluma.cron
    - role: buluma.buildtools
    - role: buluma.epel
    - role: buluma.python_pip
    - openssl_items:
        - common_name: "{{ ansible_facts['fqdn'] }}"
          name: apache-httpd
      role: buluma.openssl
    - role: buluma.selinux
    - role: buluma.httpd
    - role: buluma.redis
    - remi_enabled_repositories:
        - php73
      role: buluma.remi
      when:
        - ansible_facts['distribution'] != "Fedora"
    - role: buluma.php
    - role: buluma.php_fpm
    - mysql_databases:
        - collation: utf8_bin
          encoding: utf8
          name: owncloud
      mysql_users:
        - name: owncloud
          password: 0wnCl0uD
          priv: owncloud.*:ALL
      role: buluma.mysql
