---
- name: assert | Test if owncloud_version is set correctly
  ansible.builtin.assert:
    quiet: true
    that:
      - owncloud_version is defined
      - owncloud_version is string
- name: assert | Test if owncloud_domain_url is set correctly
  ansible.builtin.assert:
    quiet: true
    that:
      - owncloud_domain_url is defined
      - owncloud_domain_url is string
- name: assert | Test if owncloud_database_name is set correctly
  ansible.builtin.assert:
    quiet: true
    that:
      - owncloud_database_name is defined
      - owncloud_database_name is string
- name: assert | Test if owncloud_database_user is set correctly
  ansible.builtin.assert:
    quiet: true
    that:
      - owncloud_database_user is defined
      - owncloud_database_user is string
- name: assert | Test if owncloud_database_pass is set correctly
  ansible.builtin.assert:
    quiet: true
    that:
      - owncloud_database_pass is defined
      - owncloud_database_pass is string
- name: assert | Test if owncloud_database_host is set correctly
  ansible.builtin.assert:
    quiet: true
    that:
      - owncloud_database_host is defined
